name: Build CarpetPlugin

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x CarpetPlugin-1.21/gradlew

      - name: Build with Gradle
        run: cd CarpetPlugin-1.21 && ./gradlew:shadowJar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: CarpetPlugin-1.21
          path: CarpetPlugin-1.21/build/libs/*.jar
